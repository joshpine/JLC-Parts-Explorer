<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Browse · JLC Parts Explorer</title>
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/tonsky/FiraCode@6.2/distr/fira_code.css" />
  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/layout.css" />
</head>
<body>
  <div data-nav></div>
  <main class="wrap wrap--wide category-page">
    <header class="category-page__header">
      <div>
        <div class="muted mono" style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase" id="cat-crumbs"></div>
        <h2 id="cat-title">Browse</h2>
        <p class="muted" id="cat-count" style="margin-top:4px"></p>
      </div>
      <div style="display:flex;gap:var(--sp-3);align-items:center">
        <label class="toggle"><input type="checkbox" id="toggle-instock" checked /><span class="toggle__track"></span>In stock</label>
        <label class="toggle"><input type="checkbox" id="toggle-basiconly" /><span class="toggle__track"></span>Basic only</label>
      </div>
    </header>

    <nav class="chips" id="cat-tabs" style="margin-bottom:var(--sp-4)"></nav>

    <div class="chips" id="cat-chips" style="margin-bottom:var(--sp-3)"></div>

    <section class="category-page__facets" id="facets"></section>

    <section id="cat-results"></section>
  </main>

  <script type="module" src="./js/pages/category-page.js"></script>
</body>
</html>
